<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloads</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            font-family: "Lato", sans-serif;
            background-color: #232323;
            zoom: 120%;
        }

        .bg {
            background-color: #232323;
            height: 100%;
            position: relative;
        }

        .text {
            text-align: left;
            color: #f1f1f1;
            left: 20px;
            right: 20px;
            position: absolute;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;

        }

        .btn {
            background-color: #3c3c3c;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s, transform 0.2s;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #535353;
            transform: scale(1.05);
        }

        .btn i {
            margin-right: 5px;
        }

        .header {
            background-color: #111111;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 3;
            top: 0;
            left: 0;
            background-color: #111;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
        }

        .sidenav a {
            padding: 8px 8px 8px 32px;
            text-decoration: none;
            font-size: 25px;
            color: #818181;
            display: block;
            transition: 0.3s;
        }

        .sidenav a:hover {
            color: #f1f1f1;
        }

        .sidenav .closebtn {
            position: absolute;
            top: 0;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
        }

        #menuBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 30px;
            cursor: pointer;
            color: white;
            z-index: 2;
        }

        @media screen and (max-height: 450px) {
            .sidenav {
                padding-top: 15px;
            }

            .sidenav a {
                font-size: 18px;
            }

            .text {
                font-size: 2px;
            }
        }
    </style>
</head>

<body>

    <div class="bg">
        <div class="header">Downloads</div>
        <div class="text">
            <div class="download-item">
                <span>Zusammenfassung "Lost World - Der Code des Lebens"</span>
                <a href="lost_world1.pdf" download><button class="btn"><i class="fa fa-download"></i> Download</button></a>
            </div>
            <div class="download-item">
                <span>Werbefoto "Lost World - Der Code des Lebens"</span>
                <a href="photo.jpg" download><button class="btn"><i class="fa fa-download"></i> Download</button></a>
            </div>
        </div>
    </div>

    <div id="mySidenav" class="sidenav">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <a href="index.html">Startseite</a>
        <a href="tm.html">Mold</a>
        <a href="buecher.html">Bücher</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="impressum.html">Impressum</a>
    </div>

    <span id="menuBtn" onclick="openNav()">&#9776; </span>
    <script>
        function openNav() {
            document.getElementById("mySidenav").style.width = "250px";
        }

        function closeNav() {
            document.getElementById("mySidenav").style.width = "0";
        }
    </script>
</body>
</html>
